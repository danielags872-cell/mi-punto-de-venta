<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario y Caja</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Sistema de Inventario y Caja</h1>

        <div class="mb-10 p-4 border-l-4 border-blue-500 bg-blue-50">
            <h2 class="font-semibold mb-3">Registrar / Actualizar Producto</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="prodNombre" type="text" placeholder="Nombre del producto" class="p-2 border rounded">
                <input id="prodPrecio" type="number" placeholder="Precio de venta" class="p-2 border rounded">
                <input id="prodStock" type="number" placeholder="Cantidad inicial" class="p-2 border rounded">
                <button onclick="agregarProducto()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Guardar en Inventario</button>
            </div>
        </div>

        <div class="mb-10">
            <h2 class="font-semibold mb-3">Existencias Actuales</h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-2 border">Producto</th>
                        <th class="p-2 border">Precio</th>
                        <th class="p-2 border">Stock</th>
                        <th class="p-2 border">Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaInventario"></tbody>
            </table>
        </div>

        <div class="p-4 border-l-4 border-green-500 bg-green-50">
            <h2 class="font-semibold mb-3">Cuadre de Caja Diaria</h2>
            <p class="text-lg">Total Ventas Hoy: <span id="totalCaja" class="font-bold text-green-700">$0</span></p>
            <button onclick="limpiarCaja()" class="mt-2 text-xs text-red-500 underline">Reiniciar Caja del Día</button>
        </div>
    </div>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventario')) || [];
        let ventasHoy = parseFloat(localStorage.getItem('ventasHoy')) || 0;

        function guardarDatos() {
            localStorage.setItem('inventario', JSON.stringify(inventario));
            localStorage.setItem('ventasHoy', ventasHoy.toString());
            renderizar();
        }

        function agregarProducto() {
            const nombre = document.getElementById('prodNombre').value;
            const precio = parseFloat(document.getElementById('prodPrecio').value);
            const stock = parseInt(document.getElementById('prodStock').value);

            if(nombre && precio && stock) {
                inventario.push({ nombre, precio, stock });
                guardarDatos();
                limpiarFormulario();
            }
        }

        function venderProducto(index) {
            if(inventario[index].stock > 0) {
                inventario[index].stock--;
                ventasHoy += inventario[index].precio;
                guardarDatos();
            } else {
                alert("Sin existencias");
            }
        }

        function renderizar() {
            const tabla = document.getElementById('tablaInventario');
            tabla.innerHTML = '';
            inventario.forEach((prod, index) => {
                tabla.innerHTML += `
                    <tr>
                        <td class="p-2 border">${prod.nombre}</td>
                        <td class="p-2 border">$${prod.precio}</td>
                        <td class="p-2 border">${prod.stock}</td>
                        <td class="p-2 border">
                            <button onclick="venderProducto(${index})" class="bg-green-500 text-white px-2 py-1 rounded text-sm">Vender</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('totalCaja').innerText = `$${ventasHoy.toFixed(2)}`;
        }

        function limpiarFormulario() {
            document.getElementById('prodNombre').value = '';
            document.getElementById('prodPrecio').value = '';
            document.getElementById('prodStock').value = '';
        }

        function limpiarCaja() {
            if(confirm("¿Seguro que quieres reiniciar la caja?")) {
                ventasHoy = 0;
                guardarDatos();
            }
        }

        renderizar();
    </script>
</body>
</html>
