<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Pro: Inventario, Ventas y Ganancias</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-3xl font-bold text-slate-800 text-center mb-8">Gestión de Negocio y Utilidades</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-4 border-b pb-2">Registrar Producto</h2>
                <div class="space-y-3">
                    <input id="prodNombre" type="text" placeholder="Nombre del producto" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="prodCosto" type="number" placeholder="Costo ($)" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                        <input id="prodPrecio" type="number" placeholder="Venta ($)" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                    </div>
                    <input id="prodStock" type="number" placeholder="Stock Inicial" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                    <button onclick="agregarProducto()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Guardar Producto</button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-4 border-b pb-2 text-sm uppercase">Inventario y Margen</h2>
                <div class="overflow-y-auto max-h-64">
                    <table class="w-full text-xs md:text-sm">
                        <thead class="sticky top-0 bg-white shadow-sm">
                            <tr class="text-slate-500 border-b">
                                <th class="p-2 text-left">Producto</th>
                                <th class="p-2 text-left">Venta</th>
                                <th class="p-2 text-left">Ganancia/u</th>
                                <th class="p-2 text-left">Stock</th>
                                <th class="p-2 text-right">Vender</th>
                            </tr>
                        </thead>
                        <tbody id="tablaInventario"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="font-bold text-slate-700 mb-3 text-sm uppercase">Caja de Hoy</h2>
                <div class="space-y-2">
                    <div class="flex justify-between"><span>Efectivo:</span> <span id="cajaEfectivo" class="font-bold text-emerald-600">$0</span></div>
                    <div class="flex justify-between"><span>Transf:</span> <span id="cajaTransfer" class="font-bold text-blue-600">$0</span></div>
                    <div class="pt-2 border-t flex justify-between text-lg font-black text-slate-800">
                        <span>Total:</span> <span id="totalCaja">$0</span>
                    </div>
                </div>
            </div>

            <div class="bg-indigo-50 p-5 rounded-xl border border-indigo-200 shadow-sm">
                <h2 class="font-bold text-indigo-800 mb-3 text-sm uppercase">Utilidad Neta (Hoy)</h2>
                <p class="text-xs text-indigo-600 mb-2 italic">Lo que realmente ganaste tras descontar costos:</p>
                <p id="gananciaHoy" class="text-3xl font-black text-indigo-700">$0</p>
                <div class="mt-4 pt-2 border-t border-indigo-100 flex justify-between items-center text-xs text-indigo-800">
                    <span>Acumulado Mes:</span>
                    <span id="totalMes" class="font-bold">$0</span>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-3 text-sm uppercase">Cierres Pasados</h2>
                <div class="overflow-y-auto max-h-32">
                    <ul id="listaHistorial" class="divide-y divide-slate-100 text-[11px]"></ul>
                </div>
                <button onclick="limpiarCajaManual()" class="w-full mt-3 bg-red-50 text-red-600 py-1 rounded text-xs hover:bg-red-100">Cerrar Caja Ahora</button>
            </div>
        </div>
    </div>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventario')) || [];
        let ventas = JSON.parse(localStorage.getItem('ventasDiarias')) || { efectivo: 0, transfer: 0, ganancia: 0, fecha: "" };
        let historial = JSON.parse(localStorage.getItem('historialCierres')) || [];

        function verificarCambioDeDia() {
            const hoy = new Date().toLocaleDateString();
            if (ventas.fecha !== "" && ventas.fecha !== hoy) {
                cerrarCaja();
            }
            ventas.fecha = hoy;
            renderizar();
        }

        function cerrarCaja() {
            const totalDia = ventas.efectivo + ventas.transfer;
            if(totalDia > 0 || ventas.ganancia > 0) {
                historial.unshift({
                    fecha: ventas.fecha,
                    total: totalDia,
                    ganancia: ventas.ganancia
                });
                if(historial.length > 31) historial.pop();
                localStorage.setItem('historialCierres', JSON.stringify(historial));
            }
            ventas.efectivo = 0;
            ventas.transfer = 0;
            ventas.ganancia = 0;
        }

        function agregarProducto() {
            const nombre = document.getElementById('prodNombre').value;
            const costo = parseFloat(document.getElementById('prodCosto').value);
            const precio = parseFloat(document.getElementById('prodPrecio').value);
            const stock = parseInt(document.getElementById('prodStock').value);

            if(nombre && !isNaN(costo) && !isNaN(precio)) {
                inventario.push({ nombre, costo, precio, stock });
                guardarYRender();
                // Limpiar campos
                ['prodNombre', 'prodCosto', 'prodPrecio', 'prodStock'].forEach(id => document.getElementById(id).value = '');
            }
        }

        function vender(index, metodo) {
            if(inventario[index].stock > 0) {
                const prod = inventario[index];
                prod.stock--;
                
                if(metodo === 'efectivo') ventas.efectivo += prod.precio;
                else ventas.transfer += prod.precio;

                // Cálculo de ganancia: Precio Venta - Costo
                const gananciaUnidad = prod.precio - prod.costo;
                ventas.ganancia += gananciaUnidad;

                guardarYRender();
            } else {
                alert("Sin existencias");
            }
        }

        function renderizar() {
            const tabla = document.getElementById('tablaInventario');
            tabla.innerHTML = '';
            inventario.forEach((prod, index) => {
                const gananciaU = prod.precio - prod.costo;
                tabla.innerHTML += `
                    <tr class="border-b border-slate-50 hover:bg-slate-50">
                        <td class="p-2 font-medium">${prod.nombre}</td>
                        <td class="p-2">$${prod.precio.toLocaleString()}</td>
                        <td class="p-2 text-indigo-600 font-semibold">$${gananciaU.toLocaleString()}</td>
                        <td class="p-2 font-bold ${prod.stock < 5 ? 'text-red-500' : 'text-slate-600'}">${prod.stock}</td>
                        <td class="p-2 text-right space-x-1">
                            <button onclick="vender(${index}, 'efectivo')" class="bg-emerald-500 text-white px-2 py-1 rounded text-[10px]">💵</button>
                            <button onclick="vender(${index}, 'transfer')" class="bg-blue-500 text-white px-2 py-1 rounded text-[10px]">📱</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('cajaEfectivo').innerText = `$${ventas.efectivo.toLocaleString()}`;
            document.getElementById('cajaTransfer').innerText = `$${ventas.transfer.toLocaleString()}`;
            document.getElementById('totalCaja').innerText = `$${(ventas.efectivo + ventas.transfer).toLocaleString()}`;
            document.getElementById('gananciaHoy').innerText = `$${ventas.ganancia.toLocaleString()}`;

            // Acumulado del mes (ventas brutas)
            const ventasMes = historial.reduce((acc, c) => acc + c.total, 0) + (ventas.efectivo + ventas.transfer);
            document.getElementById('totalMes').innerText = `$${ventasMes.toLocaleString()}`;

            const lista = document.getElementById('listaHistorial');
            lista.innerHTML = historial.map(c => `
                <li class="py-1 flex justify-between">
                    <span>${c.fecha}</span>
                    <span class="font-bold text-slate-700">$${c.total.toLocaleString()} (Utilidad: $${c.ganancia.toLocaleString()})</span>
                </li>
            `).join('');
        }

        function guardarYRender() {
            localStorage.setItem('inventario', JSON.stringify(inventario));
            localStorage.setItem('ventasDiarias', JSON.stringify(ventas));
            renderizar();
        }

        function limpiarCajaManual() {
            if(confirm("Cerrar caja guardará los datos en el historial y reiniciará el contador diario.")) {
                cerrarCaja();
                ventas.fecha = new Date().toLocaleDateString();
                guardarYRender();
            }
        }

        verificarCambioDeDia();
    </script>
</body>
</html>
